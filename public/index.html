<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fintoc — Conectar banco</title>
    <script src="https://js.fintoc.com/v1/"></script>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 64px auto;
        padding: 0 20px;
        color: #111;
      }
      button {
        font-size: 16px;
        padding: 12px 24px;
        border: 0;
        border-radius: 8px;
        background: #4f46e5;
        color: #fff;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      pre {
        background: #f4f4f5;
        padding: 16px;
        border-radius: 8px;
        overflow: auto;
        font-size: 13px;
      }
      .ok {
        color: #15803d;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>Conectar banco con Fintoc</h1>
    <p>Producto: <strong>movements</strong>. Al conectar, el link se guarda en <code>.env</code>.</p>
    <button id="connect">Conectar banco</button>
    <p id="status"></p>
    <pre id="result" hidden></pre>

    <script>
      const PUBLIC_KEY = "__PUBLIC_KEY__";
      const btn = document.getElementById("connect");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");

      function setStatus(msg, cls = "") {
        statusEl.className = cls;
        statusEl.textContent = msg;
      }

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        setStatus("Creando link intent...");

        try {
          const r = await fetch("/create-link-intent", { method: "POST" });
          const { widget_token, error } = await r.json();
          if (error) throw new Error(error);

          setStatus("Abriendo widget...");

          const widget = Fintoc.create({
            publicKey: PUBLIC_KEY,
            widgetToken: widget_token,
            onSuccess: async (linkIntent) => {
              try {
                setStatus("Intercambiando token...");
                const exchangeToken =
                  linkIntent.exchangeToken || linkIntent.exchange_token;

                const er = await fetch("/exchange", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ exchange_token: exchangeToken }),
                });
                const data = await er.json();
                if (data.error) throw new Error(data.error);

                setStatus("Conectado. Link guardado en .env.", "ok");
                resultEl.hidden = false;
                resultEl.textContent = JSON.stringify(data, null, 2);
              } catch (e) {
                setStatus("Error en exchange: " + e.message, "err");
              } finally {
                btn.disabled = false;
              }
            },
            onExit: () => {
              setStatus("Widget cerrado.");
              btn.disabled = false;
            },
          });

          widget.open();
        } catch (e) {
          setStatus("Error: " + e.message, "err");
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
